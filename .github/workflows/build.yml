name: Build dev releases

# Builds Nextflow from nextflow-io/nextflow (tracked branches + recently
# updated open PRs) and publishes the artifacts as pre-releases in this repo.
#
# Security note: PR builds execute untrusted code (gradle build scripts), so
# the `build` job runs with a read-only token and no secrets. Publishing
# happens in a separate job that never executes code from the source repo.

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull request number in nextflow-io/nextflow to build'
        required: false
        type: string
      branch:
        description: 'Branch in nextflow-io/nextflow to build'
        required: false
        type: string

# Serialize runs so concurrent publishes don't race on git pushes
concurrency:
  group: dev-builds
  cancel-in-progress: false

env:
  SOURCE_REPO: nextflow-io/nextflow
  PR_ACTIVITY_WINDOW_DAYS: 7

jobs:

  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      any: ${{ steps.plan.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine builds needed
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          candidates='[]'

          # kind channel ref sha
          add_candidate() {
            local kind=$1 channel=$2 ref=$3 sha=$4
            local base version tag
            base=$(gh api "repos/$SOURCE_REPO/contents/VERSION?ref=$sha" --jq .content | base64 -d | tr -d '[:space:]')
            version="${base}-${channel}-${sha:0:7}"
            tag="v${version}"
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --silent >/dev/null 2>&1; then
              echo "skip  $channel: $tag already published"
              return 0
            fi
            echo "build $channel: $version"
            candidates=$(jq -c \
              --arg kind "$kind" --arg channel "$channel" --arg ref "$ref" \
              --arg sha "$sha" --arg version "$version" \
              '. + [{kind:$kind, channel:$channel, ref:$ref, sha:$sha, version:$version}]' \
              <<< "$candidates")
          }

          add_branch() {
            local branch=$1 sha channel
            sha=$(gh api "repos/$SOURCE_REPO/branches/$branch" --jq .commit.sha)
            channel=$(printf '%s' "$branch" | tr -c 'a-zA-Z0-9' '-')
            add_candidate branch "$channel" "$sha" "$sha"
          }

          add_pr() {
            local num=$1 sha=${2:-}
            [ -n "$sha" ] || sha=$(gh api "repos/$SOURCE_REPO/pulls/$num" --jq .head.sha)
            add_candidate pr "pr-${num}" "refs/pull/${num}/head" "$sha"
          }

          if [ -n "$INPUT_PR" ]; then
            add_pr "$INPUT_PR"
          elif [ -n "$INPUT_BRANCH" ]; then
            add_branch "$INPUT_BRANCH"
          else
            # tracked branches
            while read -r b; do
              if [ -n "$b" ] && [ "${b:0:1}" != '#' ]; then
                add_branch "$b"
              fi
            done < BRANCHES

            # open PRs with recent activity
            cutoff=$(date -u -d "-${PR_ACTIVITY_WINDOW_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)
            mapfile -t prs < <(gh api "repos/$SOURCE_REPO/pulls?state=open&sort=updated&direction=desc&per_page=100" \
              --jq ".[] | select(.updated_at >= \"$cutoff\") | \"\(.number) \(.head.sha)\"")
            for entry in "${prs[@]}"; do
              add_pr $entry
            done
          fi

          count=$(jq length <<< "$candidates")
          echo "-> $count build(s) needed"
          echo "matrix={\"include\":$candidates}" >> "$GITHUB_OUTPUT"
          [ "$count" -gt 0 ] && echo "any=true" >> "$GITHUB_OUTPUT" || echo "any=false" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    if: needs.plan.outputs.any == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    name: build ${{ matrix.version }}
    steps:
      - name: Checkout ${{ env.SOURCE_REPO }}@${{ matrix.ref }}
        uses: actions/checkout@v4
        with:
          repository: nextflow-io/nextflow
          ref: ${{ matrix.ref }}

      - name: Verify commit
        run: |
          actual=$(git rev-parse HEAD)
          if [ "$actual" != "${{ matrix.sha }}" ]; then
            echo "::error::Head moved since planning: expected ${{ matrix.sha }}, got $actual. The next scheduled run will pick up the new commit."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set dev version
        run: echo "${{ matrix.version }}" > VERSION

      - name: Build distribution
        run: |
          ./gradlew buildInfo releaseInfo
          BUILD_PACK=1 ./gradlew pack

      - name: Stage release assets
        run: |
          set -euo pipefail
          v="${{ matrix.version }}"
          mkdir stage
          cp "build/releases/nextflow-$v-one.jar" stage/
          cp "build/releases/nextflow-$v-dist" stage/
          cp nextflow stage/nextflow
          (cd stage && sha256sum * > checksums.sha256)
          jq -n \
            --arg kind "${{ matrix.kind }}" --arg channel "${{ matrix.channel }}" \
            --arg sha "${{ matrix.sha }}" --arg version "$v" \
            '{kind:$kind, channel:$channel, sha:$sha, version:$version}' \
            > stage/meta.json

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}
          path: stage
          retention-days: 3

  publish:
    needs: [plan, build]
    # always() so that successful builds publish even when a sibling matrix entry failed
    if: always() && needs.plan.outputs.any == 'true' && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p latest
          for dir in artifacts/*/; do
            meta="$dir/meta.json"
            [ -f "$meta" ] || continue
            version=$(jq -r .version "$meta")
            channel=$(jq -r .channel "$meta")
            sha=$(jq -r .sha "$meta")
            kind=$(jq -r .kind "$meta")
            tag="v$version"

            if [ "$kind" = pr ]; then
              prnum="${channel#pr-}"
              source_desc="pull request [#${prnum}](https://github.com/$SOURCE_REPO/pull/${prnum}), commit"
            else
              source_desc="branch \`${channel}\`, commit"
            fi

            notes=$(cat <<EOF
          Automated development build of Nextflow. **For testing purposes only.**

          Built from ${source_desc} [\`${sha:0:7}\`](https://github.com/$SOURCE_REPO/commit/${sha}) by [this workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).

          ### Use with an existing Nextflow installation

          \`\`\`bash
          export NXF_BASE=https://github.com/${GITHUB_REPOSITORY}/releases/download
          export NXF_VER=${version}
          nextflow run hello
          \`\`\`

          Revert to your normal version with \`unset NXF_BASE NXF_VER\`.

          ### Or as a standalone executable (no Nextflow required)

          \`\`\`bash
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/nextflow-${version}-dist -o nextflow-dev
          chmod +x nextflow-dev
          ./nextflow-dev run hello
          \`\`\`
          EOF
            )

            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "release $tag already exists, skipping"
            else
              gh release create "$tag" \
                --repo "$GITHUB_REPOSITORY" \
                --prerelease \
                --title "$version" \
                --notes "$notes" \
                "$dir"/*
              echo "published $tag"
            fi

            echo "$version" > "latest/$channel"
          done

          # update the latest-version pointer files
          git add latest
          if ! git diff --cached --quiet; then
            git -c user.name='github-actions[bot]' \
                -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                commit -m "Update latest build pointers"
            git push
          fi
