name: Cleanup old releases

# Prunes dev build releases:
#   - deletes builds for pull requests that have been closed or merged
#   - keeps only the most recent builds per PR and per branch

on:
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:

concurrency:
  group: dev-builds
  cancel-in-progress: false

env:
  SOURCE_REPO: nextflow-io/nextflow
  KEEP_PER_BRANCH: 30
  KEEP_PER_PR: 3

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prune releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/prune-releases.sh
